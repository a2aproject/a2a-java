# Index dependencies for CDI bean discovery
quarkus.index-dependency.server-conversion.group-id=org.a2aproject.sdk
quarkus.index-dependency.server-conversion.artifact-id=a2a-java-sdk-compat-0.3-server-conversion
quarkus.index-dependency.server-conversion.classifier=tests

# Use test HTTP client
quarkus.arc.selected-alternatives=org.a2aproject.sdk.server.apps.common.TestHttpClient

# Exclude v1.0 test producers that conflict with v0.3 compat layer
quarkus.arc.exclude-types=org.a2aproject.sdk.server.apps.common.AgentExecutorProducer,org.a2aproject.sdk.server.apps.common.AgentCardProducer

# Debug logging for event processing and request handling
quarkus.log.category."org.a2aproject.sdk.server.events".level=DEBUG
quarkus.log.category."org.a2aproject.sdk.server.requesthandlers".level=DEBUG
quarkus.log.category."org.a2aproject.sdk.server.tasks".level=DEBUG
