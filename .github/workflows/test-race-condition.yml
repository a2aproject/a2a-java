name: Test Race Condition Fix (Temporary)

on:
  push:
    branches:
      - intermittent-failure
  pull_request:
    branches:
      - intermittent-failure
  workflow_dispatch:

jobs:
  test-agent-to-agent-100-times:
    name: Run testAgentToAgentLocalHandling 100 times
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build project
        run: mvn clean install -DskipTests -DskipDockerTests=true

      - name: Run testAgentToAgentLocalHandling 100 times
        run: |
          cd reference/jsonrpc
          echo "Running testAgentToAgentLocalHandling 100 times..."

          for i in {1..100}; do
            echo "=== Iteration $i/100 ==="

            # Run the test
            if ! mvn test -Dtest=QuarkusA2AJSONRPCJdkTest#testAgentToAgentLocalHandling -DskipDockerTests=true; then
              echo "FAILURE detected on iteration $i"
              echo "Test failed after $i iterations" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi

            echo "Iteration $i: PASSED"
          done

          echo "SUCCESS: All 100 iterations passed!" | tee -a $GITHUB_STEP_SUMMARY

      - name: Run testAgentToAgentDelegation 100 times
        run: |
          cd reference/jsonrpc
          echo "Running testAgentToAgentDelegation 100 times..."

          for i in {1..100}; do
            echo "=== Iteration $i/100 ==="

            # Run the test
            if ! mvn test -Dtest=QuarkusA2AJSONRPCJdkTest#testAgentToAgentDelegation -DskipDockerTests=true; then
              echo "FAILURE detected on iteration $i"
              echo "testAgentToAgentDelegation failed after $i iterations" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi

            echo "Iteration $i: PASSED"
          done

          echo "SUCCESS: All 100 iterations of testAgentToAgentDelegation passed!" | tee -a $GITHUB_STEP_SUMMARY
